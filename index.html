<!DOCTYPE html>
<html>
<head>
  <title>Italy Story Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Create map centered in Italy
  var map = L.map('map').setView([43.0, 12.5], 6);

  // Add OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Florence
  var marker1 = L.marker([43.7696, 11.2558]).addTo(map);
  marker1.bindPopup("<b>Florence</b><br>A city that feels like a novel.");

  // Rome
  var marker2 = L.marker([41.9028, 12.4964]).addTo(map);
  marker2.bindPopup("<b>Rome</b><br>Layers of history in every corner.");

  // Venice
  var marker3 = L.marker([45.4408, 12.3155]).addTo(map);
  marker3.bindPopup("<b>Venice</b><br>A dream floating on water.");
</script>

</body>
</html>
