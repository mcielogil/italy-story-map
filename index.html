<!DOCTYPE html>
<html>
<head>
  <title>Italy Story Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1c1a14;
      --ink-soft: #2e2a1e;
      --parchment: #f2ead8;
      --parchment-dark: #e0d4b8;
      --olive: #3d4a2e;
      --olive-mid: #556b3d;
      --gold: #b8953a;
      --gold-light: #d4ae5a;
      --cream: #f8f3e8;
      --muted: #8a8270;
      --terracotta: #9b4f2e;
    }

    body { font-family: 'Jost', sans-serif; background: var(--ink); overflow: hidden; }

    #map { height: 100vh; width: 100%; }

    /* warm sepia-toned map */
    .leaflet-tile-pane { filter: sepia(35%) saturate(0.8) brightness(0.97) hue-rotate(10deg); }

    /* OPENING SCREEN */
    #opening {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 1s ease;
    }

    #opening.fade-out { opacity: 0; pointer-events: none; }

    .opening-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 640px;
      padding: 0 32px;
      animation: fadeUp 1.2s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .opening-rule {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    }

    .opening-eyebrow {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .opening-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 7vw, 80px);
      font-weight: 300;
      color: var(--parchment);
      text-align: center;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .opening-title em {
      font-style: italic;
      color: var(--gold-light);
    }

    .opening-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(15px, 2vw, 19px);
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      max-width: 460px;
    }

    .opening-btn {
      margin-top: 12px;
      padding: 13px 44px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .opening-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .opening-btn:hover::before { transform: scaleX(1); }
    .opening-btn span { position: relative; z-index: 1; }
    .opening-btn:hover span { color: var(--ink); }

    /* SIDEBAR */
    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 1000;
      width: 240px;
      background: var(--ink);
      border-right: 1px solid #2e2a1e;
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
      gap: 0;
    }

    .sidebar-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--parchment);
      line-height: 1.2;
      letter-spacing: 0.01em;
      margin-bottom: 4px;
    }

    .sidebar-logo em {
      font-style: italic;
      color: var(--gold-light);
    }

    .sidebar-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 12px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .sidebar-rule {
      height: 1px;
      background: #2e2a1e;
      margin-bottom: 24px;
    }

    .sidebar-section-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 7px 10px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #5a5244;
      text-align: left;
      transition: all 0.2s;
      border-radius: 2px;
      letter-spacing: 0.02em;
    }

    .filter-btn.active { color: var(--parchment); background: #2e2a1e; }
    .filter-btn:hover { color: var(--gold-light); }

    .filter-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 24px;
      border-top: 1px solid #2e2a1e;
      font-size: 10px;
      color: #3d3828;
      font-family: 'Jost', sans-serif;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    /* MAP OFFSET */
    #map { margin-left: 240px; width: calc(100vw - 240px); }

    /* CUSTOM MARKERS */
    .map-pin {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .map-pin:hover { transform: translateY(-3px); }

    .pin-head {
      width: 22px;
      height: 22px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .pin-stem {
      width: 2px;
      height: 8px;
      margin-top: -1px;
    }

    /* LEAFLET OVERRIDES */
    .leaflet-popup-content-wrapper {
      background: var(--ink);
      border: 1px solid #2e2a1e;
      border-radius: 0;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      padding: 0;
    }

    .leaflet-popup-content { margin: 0; padding: 0; }
    .leaflet-popup-tip { background: var(--ink); }
    .leaflet-popup-close-button { color: var(--muted) !important; font-size: 16px !important; top: 8px !important; right: 10px !important; }
    .leaflet-popup-close-button:hover { color: var(--parchment) !important; }
    .leaflet-control-zoom { border: 1px solid #2e2a1e !important; border-radius: 0 !important; }
    .leaflet-control-zoom a { background: var(--ink) !important; color: var(--muted) !important; border-bottom: 1px solid #2e2a1e !important; }
    .leaflet-control-zoom a:hover { background: #2e2a1e !important; color: var(--parchment) !important; }

    /* POPUP */
    .popup-card { max-width: 280px; min-width: 220px; }
    .popup-card.has-image { max-width: 500px; min-width: 420px; }

    .popup-tabs {
      display: flex;
      border-bottom: 1px solid #2e2a1e;
      padding: 0 20px;
      overflow-x: auto;
    }

    .popup-tabs::-webkit-scrollbar { display: none; }

    .popup-tab {
      padding: 11px 10px;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      color: #3d3828;
      border-bottom: 1.5px solid transparent;
      margin-bottom: -1px;
      user-select: none;
      white-space: nowrap;
      font-family: 'Jost', sans-serif;
      transition: color 0.2s;
    }

    .popup-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .popup-tab:hover { color: var(--parchment); }

    .popup-tab-content { display: none; }

    .popup-tab-content.active {
      display: flex;
      align-items: stretch;
    }

    .popup-tab-content.simple-content {
      display: none;
      flex-direction: column;
      padding: 22px 22px;
    }

    .popup-tab-content.simple-content.active { display: flex; }

    .tab-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      font-family: 'Jost', sans-serif;
    }

    .tab-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      line-height: 1.7;
      color: #a09070;
      font-style: italic;
      font-weight: 300;
    }

    .popup-card.has-image img {
      width: 150px;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    .popup-inner { padding: 22px; flex: 1; }

    .popup-text h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 20px;
      color: var(--parchment);
      margin-bottom: 3px;
      line-height: 1.15;
      letter-spacing: 0.01em;
    }

    .popup-category {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      font-family: 'Jost', sans-serif;
    }

    .popup-text p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      line-height: 1.75;
      color: #9a8e7a;
      font-style: italic;
      font-weight: 300;
    }

    .popup-no-tabs { padding: 22px; }
  </style>
</head>
<body>

  <div id="opening">
    <div class="opening-inner">
      <div class="opening-eyebrow">A writer's map of Italy</div>
      <div class="opening-rule"></div>
      <div class="opening-title">Italy, <em>felt slowly</em></div>
      <div class="opening-subtitle">A map for the kind of traveller who reads a city with their whole body and cannot help but write it down.</div>
      <button class="opening-btn" onclick="enterMap()"><span>Enter the map</span></button>
    </div>
  </div>

  <div id="sidebar">
    <div class="sidebar-logo">Italy,<br><em>felt slowly</em></div>
    <div class="sidebar-tagline">A writer's map</div>
    <div class="sidebar-rule"></div>
    <div class="sidebar-section-label">Show on map</div>
    <div class="filter-list">
      <button class="filter-btn active" onclick="toggleFilter(this,'Bologna Spot')" data-filter="Bologna Spot">
        <span class="filter-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="#c0392b" stroke-width="1.5"/><circle cx="7" cy="7" r="2" fill="#c0392b"/></svg>
        </span>
        Bologna spots
      </button>
      <button class="filter-btn active" onclick="toggleFilter(this,'Bologna Café')" data-filter="Bologna Café">
        <span class="filter-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="#b8953a" stroke-width="1.5"/><circle cx="7" cy="7" r="2" fill="#b8953a"/></svg>
        </span>
        Cafés
      </button>
      <button class="filter-btn active" onclick="toggleFilter(this,'Bologna Restaurant')" data-filter="Bologna Restaurant">
        <span class="filter-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="#9b4f2e" stroke-width="1.5"/><circle cx="7" cy="7" r="2" fill="#9b4f2e"/></svg>
        </span>
        Restaurants
      </button>
      <button class="filter-btn active" onclick="toggleFilter(this,'City')" data-filter="City">
        <span class="filter-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="#3d4a2e" stroke-width="1.5"/><circle cx="7" cy="7" r="2" fill="#3d4a2e"/></svg>
        </span>
        Cities
      </button>
      <button class="filter-btn active" onclick="toggleFilter(this,'other')" data-filter="other">
        <span class="filter-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="#5a5244" stroke-width="1.5"/><circle cx="7" cy="7" r="2" fill="#5a5244"/></svg>
        </span>
        Other spots
      </button>
    </div>
    <div class="sidebar-footer">
      A curated guide for writers<br>and those who travel slowly.
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>

    function enterMap() {
      var o = document.getElementById('opening');
      o.classList.add('fade-out');
      setTimeout(function() { o.style.display = 'none'; }, 1000);
    }

    var map = L.map('map', { zoomControl: false }).setView([43.8, 12.2], 6);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    var categoryColors = {
      'Bologna Spot': '#c0392b',
      'Bologna Café': '#b8953a',
      'Bologna Restaurant': '#9b4f2e',
      'City': '#556b3d',
      'Writing Spot': '#5a5244',
      'Story Moment': '#5a5244',
      'Quiet Place': '#5a5244'
    };

    function createPin(category) {
      var color = categoryColors[category] || '#5a5244';
      var svg = '<svg width="20" height="30" viewBox="0 0 20 30" fill="none" xmlns="http://www.w3.org/2000/svg">' +
        '<path d="M10 0C4.477 0 0 4.477 0 10c0 7.5 10 20 10 20S20 17.5 20 10C20 4.477 15.523 0 10 0z" fill="' + color + '" opacity="0.92"/>' +
        '<circle cx="10" cy="10" r="4" fill="rgba(255,255,255,0.5)"/>' +
        '</svg>';
      return L.divIcon({
        className: '',
        html: svg,
        iconSize: [20, 30],
        iconAnchor: [10, 30],
        popupAnchor: [0, -32]
      });
    }

    var allMarkers = [];
    var activeFilters = new Set(['Bologna Spot','Bologna Café','Bologna Restaurant','City','other']);

    var places = [
      {
        name: "Florence",
        category: "Writing Spot",
        description: "You walk at sunrise before the crowds arrive. This is where you'd start your novel.",
        lat: 43.7696, lng: 11.2558
      },
      {
        name: "Rome",
        category: "Story Moment",
        description: "You sit in Trastevere writing between bites. Chaos becomes part of your story.",
        lat: 41.9028, lng: 12.4964
      },
      {
        name: "Venice",
        category: "Quiet Place",
        description: "You get lost on purpose. Everything feels dreamlike.",
        lat: 45.4408, lng: 12.3155
      },
      {
        name: "Siena",
        category: "Story Moment",
        description: "A place where time feels slower and every street invites reflection.",
        lat: 43.3188, lng: 11.3308
      },
      {
        name: "Bologna",
        category: "City",
        description: "A city of porticoes, students, political undercurrents, and beautiful restraint. The kind of place that feels lived in rather than staged.",
        lat: 44.5058, lng: 11.3429
      },
      {
        name: "Piazza Maggiore",
        category: "Bologna Spot",
        image: "piazza-maggiore.jpg",
        challenge: "Sit on the steps and pick one stranger. Watch them for five minutes without writing anything. Then write one paragraph — not about what they did, but about what you think they are carrying.",
        curiosity: "This is dummy curiosity text for Piazza Maggiore. Something unexpected, something you would never find in a guidebook.",
        history: "This is dummy history text for Piazza Maggiore. The lives that passed through this square before yours arrived.",
        description: "The stone is cold under your hands. The square is wide and unhurried and full of light that seems to come from everywhere at once. A bicycle passes close. Voices drift without landing. Someone laughs — you don't see who. You came here to write but you don't write yet. You just sit. And something, quietly, begins to loosen. The kind of loosening you didn't know you needed until it happens. Stay. Order a coffee you don't drink. Watch a stranger read. This is where the good ideas come from — not from trying, but from this. From sitting in a square that has been holding people together for five hundred years and finally letting it hold you too.",
        lat: 44.4937, lng: 11.3431
      },
      {
        name: "I 300 Scalini (300 Steps)",
        category: "Bologna Spot",
        image: "trecento-scalini.jpg",
        challenge: "This is a dummy writing challenge. Write something here about climbing, effort, and what you find when you arrive somewhere that asked something of you.",
        curiosity: "This is dummy curiosity text for I 300 Scalini. Something unexpected about this hill that most people never know.",
        history: "This is dummy history text for I 300 Scalini. The lives before yours on this hill.",
        description: "Three hundred steps. Your legs will remind you of every single one. But the hill is green and alive around you, the city noise dropping away with each flight, and by the time you reach the top something has already shifted. The view opens without warning — Bologna below, soft and unhurried, San Luca sitting quietly on the opposite hill like it has always been waiting for you. Sit on the grass. Pour the wine. Tear the bread. Open the notebook. Up here, with the city small beneath you and the hills rolling on forever, the words come easier than they have in months. This is not a tourist spot. This is where Bolognesi come when they need to remember why they live here. Don't tell everyone.",
        lat: 44.4827, lng: 11.3150
      },
      {
        name: "Via Pescherie Vecchie",
        category: "Bologna Spot",
        image: "via-pescherie-vecchie.jpg",
        challenge: "Pick one smell, one colour, one sound from this street. Write a scene where all three appear without being described directly.",
        curiosity: "This is dummy curiosity text for Via Pescherie Vecchie. Something about this street most people walk past without noticing.",
        history: "This is dummy history text for Via Pescherie Vecchie. The lives before yours on this ancient street.",
        description: "The light is changing. Leave Piazza Maggiore behind and walk east, into the narrow lanes of the Quadrilatero. You'll feel the shift immediately — the streets tighten, the air cools, the noise becomes something closer and more human. Enter through Via Pescherie Vecchie. The smell hits you first — fish, salt, something sweet from a stall around the corner. The vendors are winding down for the evening, stacking crates, calling to each other across the lane. Slow down. Look at the colours — the deep red of the mortadella, the pale yellow of fresh pasta draped over wooden rods, the waxy glow of aged Parmigiano under dim light. Let yourself get a little lost. Turn into Via Drapperie, then double back. Buy something — a small piece of cheese, a paper cone of olives, a glass of Pignoletto from a wine merchant who pours without asking. Find a doorstep or a low ledge and sit. The last of the sun is catching the rooftops. The street is thinning out, the noise softening. This is the hour when Bologna stops performing and just breathes. Open your notebook here. Not to plan, not to organise — just to catch what's dissolving. The light, the smell, the sound of a crate being dragged across stone. You don't need to make it into anything yet. Just write it down before it disappears.",
        lat: 44.4938, lng: 11.3447
      },
      {
        name: "Piazza Minghetti",
        category: "Bologna Spot",
        image: "piazza.minghetti.jpg",
        challenge: "You weren't looking for this place. Write about a character who finds something they weren't looking for — and what it changes.",
        curiosity: "This is dummy curiosity text for Piazza Minghetti. Something quietly surprising about this square.",
        history: "This is dummy history text for Piazza Minghetti. The lives before yours in this unassuming square.",
        description: "You weren't looking for it. You were walking under the porticos of Via Farini — some of the most beautiful in Bologna, all arches and warm stone and the particular light that bounces between column and pavement — and you just kept going, because you couldn't stop. And then the street opens, quietly, into Piazza Minghetti. No landmark. No crowd. Just a small, elegant square that seems to have nothing to declare. Sit down anyway. Order something. Watch the Bolognesi pass without hurry. This is not a place that performs. It simply exists, with the confidence of somewhere that has never needed to impress anyone. Write here. Nobody will bother you.",
        lat: 44.4931, lng: 11.3408
      },
      {
        name: "Piazza Santo Stefano",
        category: "Bologna Spot",
        image: "piazza-santo-stefano.jpg",
        challenge: "Every door here opens into a different century. Write a scene where your character steps through a door and arrives somewhere unexpected in time.",
        curiosity: "This is dummy curiosity text for Piazza Santo Stefano. Something most people never notice about this ancient square.",
        history: "This is dummy history text for Piazza Santo Stefano. The lives before yours on these river pebbles.",
        description: "The square is triangular, paved with river pebbles, and feels like it was left over from another century — which in a way it was. The complex of seven churches at the far end has been here since the 5th century, each door opening into a different age. You don't need to go inside. Just stand in the square as the evening settles, when the bars open and the locals come out and the stone turns gold in the last light. Something about this place makes conversation feel more honest and silence feel less lonely. It is one of those rare spots where the past doesn't feel heavy — it just sits beside you, quietly, like an old friend.",
        lat: 44.4927, lng: 11.3488
      },
      {
        name: "Conservatorio G.B. Martini",
        category: "Bologna Spot",
        image: "conservatorio-bologna.jpg",
        challenge: "You can hear someone practicing behind a closed door. Write the scene on the other side — who is playing, what are they feeling, what are they trying to get right.",
        curiosity: "This is dummy curiosity text for the Conservatorio. Something unexpected about this courtyard and the music that lives inside it.",
        history: "This is dummy history text for the Conservatorio. The lives before yours inside these walls.",
        description: "Step through the gate and the city disappears. The courtyard of the Conservatorio Martini is all arches and old stone, a former convent where students have been practicing since 1804 — where Rossini himself once walked. Stand still for a moment and listen. Somewhere above you a violin is searching for something. A piano starts, stops, starts again. The sound floats down into the courtyard and dissolves before it reaches you. This is what it feels like to be inside someone else's devotion — that particular quality of effort that hasn't become performance yet. Bring your notebook. Whatever you write here will have music in it whether you intend it or not.",
        lat: 44.4966, lng: 11.3522
      },
      {
        name: "Caffè Zanarini",
        category: "Bologna Café",
        image: "caffe-zanarini.jpg",
        challenge: "You are standing at a bar. Around you, people arrive and leave in under two minutes. Write a character who stays longer than they should — and why.",
        curiosity: "The founder Enrico Zanarini was a baker's apprentice who built an empire. He started with a single borrowed space in 1930 and eventually ran a chain of bars across Bologna and the Romagna coast. He died in 1948. His son Giorgio turned the Piazza Galvani location into the most fashionable bar in the city — and then moved to Sydney, leaving it all behind.",
        history: "After the war, Zanarini became a quiet gathering place for Bologna's left-wing intellectuals and artists. The painter Giorgio Morandi drank his coffee here. The communist leader Palmiro Togliatti gave speeches from nearby. Actors, writers and directors passed through, stood at this same bar, looked out at the same square. The city was rebuilding itself and this was one of the places it did it.",
        description: "Order an espresso. Pay first, the way Italians do. Then take your place at the bar — standing, always standing — and say buongiorno to whoever is behind the counter. They won't stop moving. That's fine. Under the frescoed ceilings of Zanarini, open since 1930, the city has always conducted itself this way — quickly, elegantly, without fuss. Watch the Bolognesi arrive and leave. The professor with his briefcase. The woman who knows exactly what she wants before she reaches the counter. The student who hesitates. Two minutes and they're gone, back into the porticos of Pavaglione, back into the morning. This is not a place to linger. It is a place to absorb. Stand here long enough and you won't need to invent characters — they will pass right through you.",
        lat: 44.4933, lng: 11.3412
      },
      {
        name: "Trattoria da Vito",
        category: "Bologna Restaurant",
        image: "trattoria-da-vito.jpg",
        challenge: "You are at a table with strangers. The wine is already open. Write the conversation that happens after the second glass.",
        curiosity: "Guccini lived around the corner on Via Paolo Fabbri 43 — literally the title of one of his most celebrated albums. He came here almost every night for years. After midnight, when the other customers had gone, the tablecloths would come off and the bare plywood underneath became a surface for card games, sketches, notes, half-written song lyrics. The table was the first draft.",
        history: "Vito Pagani opened this place in 1949 in a neighbourhood built for factory workers. His son Paolo inherited it and inherited the regulars — Guccini, Dalla, Vecchioni, De André, Benigni, Dario Fo. One night Fabrizio De André left drunk, drove his Citroën DS into something a kilometre down the road, and couldn't remember his own name. The police found the trattoria's name on his chicken wrapper and called Paolo to come and get him. That is the kind of place this is — the kind where you are known, where someone will come and find you, where the night has no fixed ending.",
        description: "It's not in the centre. That's the point. Take the twenty minute walk to Cirenaica, the old working class neighbourhood just outside the walls, and find Via Musolesi. Red and white checked tablecloths. Green curtains. Neon light. The lasagne arrives without ceremony and it is perfect. This is where Guccini, Dalla, De André, Gaber and Fo used to eat, drink, argue about politics and play cards until the early hours. The walls still have their photographs. The chairs haven't changed. Run now by Vito's granddaughter, the place has no interest in becoming anything other than what it always was. Order the tagliatelle. Order the wine. Stay late.",
        lat: 44.4902, lng: 11.3598
      },
      {
        name: "Bari",
        category: "Story Moment",
        description: "Old women making pasta in the street, voices echoing through narrow alleys.",
        lat: 41.1171, lng: 16.8719
      },
      {
        name: "Torno",
        category: "Quiet Place",
        description: "A small village on Lake Como where time feels suspended. Stone houses, narrow paths, and stillness that pulls you inward.",
        lat: 45.8619, lng: 9.1168
      },
      {
        name: "Spello",
        category: "Writing Spot",
        description: "A quiet hill town where every street feels intentional. Flowers, silence, and the kind of beauty that slows your thoughts.",
        lat: 42.9925, lng: 12.6712
      }
    ];

    function getFilterGroup(category) {
      if (['Writing Spot','Story Moment','Quiet Place'].includes(category)) return 'other';
      return category;
    }

    function buildPopup(place) {
      var id = 'popup-' + Math.random().toString(36).substr(2,9);
      var hasImage = !!place.image;
      var hasChallenge = !!place.challenge;
      var hasCuriosity = !!place.curiosity;
      var hasHistory = !!place.history;
      var hasExtras = hasChallenge || hasCuriosity || hasHistory;

      var tabs = '';
      var contents = '';

      if (hasExtras) {
        tabs = '<div class="popup-tabs">' +
          '<div class="popup-tab active" onclick="switchTab(\'' + id + '\',\'place\')">Place</div>';
        if (hasChallenge) tabs += '<div class="popup-tab" onclick="switchTab(\'' + id + '\',\'challenge\')">Challenge</div>';
        if (hasCuriosity) tabs += '<div class="popup-tab" onclick="switchTab(\'' + id + '\',\'curiosity\')">Look Closer</div>';
        if (hasHistory) tabs += '<div class="popup-tab" onclick="switchTab(\'' + id + '\',\'history\')">The Lives Before Yours</div>';
        tabs += '</div>';
      }

      var inner = '<div class="popup-text"><h3>' + place.name + '</h3>' +
        '<div class="popup-category">' + place.category + '</div>' +
        '<p>' + place.description + '</p></div>';

      if (hasImage) {
        contents += '<div id="' + id + '-place" class="popup-tab-content active">' +
          '<img src="' + place.image + '" alt="' + place.name + '">' +
          '<div class="popup-inner">' + inner + '</div></div>';
      } else {
        contents += '<div id="' + id + '-place" class="popup-tab-content active">' +
          '<div class="popup-inner popup-no-tabs">' + inner + '</div></div>';
      }

      if (hasChallenge) contents += '<div id="' + id + '-challenge" class="popup-tab-content simple-content"><div class="tab-label">Writing Challenge</div><div class="tab-body">' + place.challenge + '</div></div>';
      if (hasCuriosity) contents += '<div id="' + id + '-curiosity" class="popup-tab-content simple-content"><div class="tab-label">Look Closer</div><div class="tab-body">' + place.curiosity + '</div></div>';
      if (hasHistory) contents += '<div id="' + id + '-history" class="popup-tab-content simple-content"><div class="tab-label">The Lives Before Yours</div><div class="tab-body">' + place.history + '</div></div>';

      return '<div class="popup-card' + (hasImage ? ' has-image' : '') + '" id="' + id + '">' + tabs + contents + '</div>';
    }

    window.switchTab = function(id, tab) {
      var card = document.getElementById(id);
      if (!card) return;
      card.querySelectorAll('.popup-tab').forEach(function(t) { t.classList.remove('active'); });
      card.querySelectorAll('.popup-tab-content').forEach(function(c) { c.classList.remove('active'); });
      var at = card.querySelector('[onclick*="\'' + tab + '\'"]');
      var ac = document.getElementById(id + '-' + tab);
      if (at) at.classList.add('active');
      if (ac) ac.classList.add('active');
    };

    window.toggleFilter = function(btn, filter) {
      if (activeFilters.has(filter)) {
        activeFilters.delete(filter);
        btn.classList.remove('active');
      } else {
        activeFilters.add(filter);
        btn.classList.add('active');
      }
      allMarkers.forEach(function(obj) {
        var group = getFilterGroup(obj.place.category);
        var show = activeFilters.has(group) || activeFilters.has(obj.place.category);
        if (show && !map.hasLayer(obj.marker)) map.addLayer(obj.marker);
        if (!show && map.hasLayer(obj.marker)) map.removeLayer(obj.marker);
      });
    };

    places.forEach(function(place) {
      var marker = L.marker([place.lat, place.lng], { icon: createPin(place.category) }).addTo(map);
      var opts = place.image ? { maxWidth: 540, minWidth: 440 } : { maxWidth: 300 };
      marker.bindPopup(buildPopup(place), opts);
      allMarkers.push({ marker: marker, place: place });
    });

  </script>
