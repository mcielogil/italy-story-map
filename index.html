<!DOCTYPE html>
<html>
<head>
  <title>Italy Story Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Create map centered in Italy
  var map = L.map('map').setView([43.0, 12.5], 6);

  // Add OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Example marker (Florence)
  var marker = L.marker([43.7696, 11.2558]).addTo(map);

  marker.bindPopup("<b>Florence</b><br>A city that feels like a novel.").openPopup();
</script>

</body>
</html>
